<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KG5IEF Antenna‑Workbench</title>

    <!-- Blueprint theme -->
    <link rel="stylesheet" href="style/theme.css">

    <!-- Main layout -->
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

<header>
    <h1>KG5IEF Antenna‑Workbench</h1>
    <h2>HF + Portable Antenna Engineering Suite</h2>
</header>

<main class="layout">

    <!-- LEFT SIDEBAR -->
    <aside id="modules" class="sidebar-left">
        <h3>Modules</h3>
        <div id="sidebar-buttons"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <section id="content" class="content-main">
        <h2>Welcome</h2>
        <p>Select a module from the left to begin.</p>
    </section>

    <!-- RIGHT INFO PANEL -->
    <aside id="sidebar" class="sidebar-right">
        <h3>Info Panel</h3>
        <p>This panel will display module-specific notes, tips, and engineering data.</p>
    </aside>

</main>

<!-- CORE APP -->
<script type="module" src="js/app.js"></script>

<!-- LOAD SIDEBAR -->
<script>
    fetch("sidebar.html")
        .then(r => r.text())
        .then(html => {
            document.getElementById("sidebar-buttons").innerHTML = html;
        })
        .catch(() => {
            document.getElementById("sidebar-buttons").innerHTML = `
                <button onclick="loadModule('vertical-designer')">Vertical Designer</button>
                <button onclick="loadModule('feedline')">Feedline & CMC Engine</button>
                <button onclick="loadModule('posters')">Posters</button>
            `;
        });
</script>

</body>
</html>
