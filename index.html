<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Antenna Workbench</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styles -->
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/theme.css">

</head>
<body>

    <div id="workbench" class="workbench">

        <!-- Sidebar -->
        <div id="sidebar-container">
            <!-- sidebar.html will be loaded here -->
        </div>

        <!-- Main Content -->
        <div id="content" class="content">
            <p>Loading Antenna Workbench…</p>
        </div>

    </div>

    <!-- App Loader -->
    <script type="module">
        import initWorkbench from "./js/app.js";

        // Load sidebar HTML dynamically
        fetch("./sidebar.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("sidebar-container").innerHTML = html;
                initWorkbench();
            })
            .catch(err => {
                document.getElementById("content").innerHTML =
                    "<p>Error loading Workbench.</p>";
                console.error(err);
            });
    </script>

</body>
</html>
